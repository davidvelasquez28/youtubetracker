<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Learning Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2e2e36;
      --accent: #d4f264;
      --accent2: #6af2b0;
      --text: #e8e8ec;
      --muted: #6b6b7a;
      --red: #ff5c5c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,242,100,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,242,100,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 48px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 12px 16px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .btn-load {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-load:hover { opacity: 0.85; }
    .btn-load:active { transform: scale(0.97); }

    .error-msg {
      font-size: 0.78rem;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: none;
      animation: fadeUp 0.35s ease both;
    }
    .card.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .video-title-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .yt-badge {
      background: var(--red);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .video-title {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .completed-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(106, 242, 176, 0.12);
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
      animation: fadeUp 0.3s ease both;
    }
    .completed-badge.show { display: flex; }
    .completed-badge svg { width: 13px; height: 13px; }

    .player-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    #ytPlayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .progress-section {
      padding: 20px 20px 0;
      border-top: 1px solid var(--border);
    }

    .progress-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .time-display {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .time-now {
      font-size: 2rem;
      font-family: 'Fraunces', serif;
      color: var(--accent);
      letter-spacing: -1px;
      min-width: 90px;
    }

    .time-sep { color: var(--muted); font-size: 1.2rem; }

    .time-total {
      font-size: 1rem;
      color: var(--muted);
    }

    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .progress-pct {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      margin-top: -16px;
      margin-bottom: 16px;
    }

    .notes-section {
      padding: 0 20px 20px;
    }

    .notes-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    .notes-area {
      width: 100%;
      min-height: 110px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.83rem;
      line-height: 1.65;
      padding: 14px 16px;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .notes-area::placeholder { color: var(--muted); }
    .notes-area:focus { border-color: var(--accent2); }

    .notes-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .timestamp-hint {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .timestamp-hint span {
      color: var(--accent2);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .timestamp-hint span:hover { opacity: 0.7; }

    .btn-save {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 7px 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-save:hover { background: var(--accent2); color: #0e0e10; }

    .save-confirm {
      font-size: 0.72rem;
      color: var(--accent2);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-confirm.show { opacity: 1; }

    .saved-notes {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .saved-note-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeUp 0.2s ease both;
    }

    .note-ts {
      color: var(--accent);
      font-size: 0.72rem;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .note-ts:hover { opacity: 0.7; }

    .note-text {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
    }

    .note-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .note-delete:hover { color: var(--red); }

    .storage-notice {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      margin-top: 20px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>YT Tracker</h1>
      <span>learning log</span>
    </header>

    <div class="input-row">
      <input type="text" id="urlInput" placeholder="Paste a YouTube URL…" autocomplete="off" />
      <button class="btn-load" id="loadBtn">Load</button>
    </div>
    <div class="error-msg" id="errorMsg">⚠ Couldn't find a valid YouTube video ID in that URL.</div>

    <div class="card" id="card">
      <div class="video-title-bar">
        <span class="yt-badge">YT</span>
        <div class="video-title" id="videoTitle">Loading title…</div>
        <div class="completed-badge" id="completedBadge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          completed
        </div>
      </div>

      <div class="player-wrap">
        <div id="ytPlayer"></div>
      </div>

      <div class="progress-section">
        <div class="progress-label">current position</div>
        <div class="time-display">
          <div class="time-now" id="timeNow">0:00</div>
          <div class="time-sep">/</div>
          <div class="time-total" id="timeTotal">—</div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>

      <div class="notes-section">
        <div class="notes-label">notes</div>
        <textarea class="notes-area" id="notesArea" placeholder="Jot something down… Ctrl+Enter to save. Click a saved timestamp to jump back."></textarea>
        <div class="notes-footer">
          <div class="timestamp-hint">
            <span id="insertTsBtn">Insert timestamp</span> into note
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="save-confirm" id="saveConfirm">saved ✓</span>
            <button class="btn-save" id="saveNoteBtn">Save Note</button>
          </div>
        </div>
        <div class="saved-notes" id="savedNotes"></div>
      </div>
    </div>

    <div class="storage-notice" id="storageNotice" style="display:none;">
      💾 notes save automatically to this browser — they'll be here next time
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    let pollInterval = null;
    let currentVideoId = null;
    let savedNotes = [];
    let ytApiReady = false;
    let pendingVideoId = null;

    // ── localStorage ─────────────────────────────────────────
    function storageKey(id)   { return 'yt-tracker-notes-' + id; }
    function completedKey(id) { return 'yt-tracker-done-' + id; }

    function loadNotes(id) {
      try { return JSON.parse(localStorage.getItem(storageKey(id)) || '[]'); }
      catch(e) { return []; }
    }
    function persistNotes(id, notes) {
      try { localStorage.setItem(storageKey(id), JSON.stringify(notes)); } catch(e) {}
    }
    function isCompleted(id) {
      return localStorage.getItem(completedKey(id)) === 'true';
    }
    function markDone(id) {
      try { localStorage.setItem(completedKey(id), 'true'); } catch(e) {}
    }

    // ── Helpers ──────────────────────────────────────────────
    function extractVideoId(url) {
      const patterns = [
        /[?&]v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /\/embed\/([a-zA-Z0-9_-]{11})/,
        /\/shorts\/([a-zA-Z0-9_-]{11})/,
      ];
      for (const re of patterns) {
        const m = url.match(re);
        if (m) return m[1];
      }
      return null;
    }

    function formatTime(sec) {
      if (!sec || isNaN(sec) || sec < 0) return '0:00';
      sec = Math.floor(sec);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      return m + ':' + String(s).padStart(2,'0');
    }

    function parseTimestamp(ts) {
      const parts = ts.split(':').map(Number);
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      return parts[0]*60 + (parts[1] || 0);
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function getCurrentTime() {
      try {
        if (player && typeof player.getCurrentTime === 'function') return player.getCurrentTime();
      } catch(e) {}
      return 0;
    }

    // ── Load video ───────────────────────────────────────────
    document.getElementById('loadBtn').addEventListener('click', loadVideo);
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadVideo();
    });

    function loadVideo() {
      const url = document.getElementById('urlInput').value.trim();
      const errorEl = document.getElementById('errorMsg');
      const videoId = extractVideoId(url);

      if (!videoId) { errorEl.style.display = 'block'; return; }
      errorEl.style.display = 'none';
      currentVideoId = videoId;

      // Reset UI
      document.getElementById('completedBadge').classList.remove('show');
      document.getElementById('savedNotes').innerHTML = '';
      document.getElementById('videoTitle').textContent = 'Loading title…';
      document.getElementById('timeNow').textContent = '0:00';
      document.getElementById('timeTotal').textContent = '—';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('progressPct').textContent = '0%';
      document.getElementById('card').classList.add('visible');
      document.getElementById('storageNotice').style.display = 'block';

      // Restore saved data for this video
      savedNotes = loadNotes(videoId);
      savedNotes.forEach(n => renderNote(n, false));
      if (isCompleted(videoId)) {
        document.getElementById('completedBadge').classList.add('show');
      }

      // Fetch title
      fetch('https://www.youtube-nocookie.com/oembed?url=https://www.youtube.com/watch?v=' + videoId + '&format=json')
        .then(r => r.json())
        .then(d => { document.getElementById('videoTitle').textContent = d.title || 'YouTube Video'; })
        .catch(() => { document.getElementById('videoTitle').textContent = 'YouTube Video'; });

      // Init player
      if (ytApiReady) {
        buildPlayer(videoId);
      } else {
        pendingVideoId = videoId;
      }
    }

    // ── YouTube IFrame API ───────────────────────────────────
    window.onYouTubeIframeAPIReady = function() {
      ytApiReady = true;
      if (pendingVideoId) {
        buildPlayer(pendingVideoId);
        pendingVideoId = null;
      }
    };

    function buildPlayer(videoId) {
      stopPolling();

      // Destroy old player and recreate target element
      if (player && typeof player.destroy === 'function') {
        try { player.destroy(); } catch(e) {}
        player = null;
      }

      // Always recreate the div so YT has a clean target
      const wrap = document.querySelector('.player-wrap');
      const old = document.getElementById('ytPlayer');
      if (old) old.remove();
      const div = document.createElement('div');
      div.id = 'ytPlayer';
      div.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
      wrap.appendChild(div);

      player = new YT.Player('ytPlayer', {
        videoId: videoId,
        playerVars: { rel: 0, modestbranding: 1, enablejsapi: 1 },
        events: {
          onReady: function() {
            updateProgress();
            startPolling();
          },
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PLAYING) {
              startPolling();
            } else if (e.data === YT.PlayerState.PAUSED) {
              stopPolling();
              updateProgress();
            } else if (e.data === YT.PlayerState.ENDED) {
              stopPolling();
              updateProgress();
              // Mark completed
              markDone(currentVideoId);
              document.getElementById('completedBadge').classList.add('show');
            }
          }
        }
      });
    }

    function startPolling() {
      stopPolling();
      pollInterval = setInterval(updateProgress, 500);
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    function updateProgress() {
      try {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        const cur = player.getCurrentTime();
        const dur = player.getDuration();
        document.getElementById('timeNow').textContent = formatTime(cur);
        if (dur > 0) document.getElementById('timeTotal').textContent = formatTime(dur);
        const pct = dur > 0 ? Math.round((cur / dur) * 100) : 0;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressPct').textContent = pct + '%';
      } catch(e) {}
    }

    // ── Notes ────────────────────────────────────────────────
    document.getElementById('insertTsBtn').addEventListener('click', () => {
      const ts = formatTime(getCurrentTime());
      const ta = document.getElementById('notesArea');
      const pos = ta.selectionStart;
      ta.value = ta.value.substring(0, pos) + '[' + ts + '] ' + ta.value.substring(pos);
      ta.focus();
      ta.setSelectionRange(pos + ts.length + 3, pos + ts.length + 3);
    });

    document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
    document.getElementById('notesArea').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveNote(); }
    });

    function saveNote() {
      const ta = document.getElementById('notesArea');
      const text = ta.value.trim();
      if (!text || !currentVideoId) return;

      const note = { ts: formatTime(getCurrentTime()), text: text, id: Date.now() };
      savedNotes.push(note);
      persistNotes(currentVideoId, savedNotes);
      renderNote(note, true);
      ta.value = '';

      const confirmEl = document.getElementById('saveConfirm');
      confirmEl.classList.add('show');
      setTimeout(() => confirmEl.classList.remove('show'), 1800);
    }

    function renderNote(note, prepend) {
      const container = document.getElementById('savedNotes');
      const el = document.createElement('div');
      el.className = 'saved-note-item';
      el.dataset.id = note.id;
      el.innerHTML =
        '<div class="note-ts" title="Jump to this time">' + note.ts + '</div>' +
        '<div class="note-text">' + escapeHtml(note.text) + '</div>' +
        '<button class="note-delete" title="Delete">×</button>';

      el.querySelector('.note-ts').addEventListener('click', () => {
        try {
          if (player && typeof player.seekTo === 'function') {
            player.seekTo(parseTimestamp(note.ts), true);
            player.playVideo();
          }
        } catch(e) {}
      });

      el.querySelector('.note-delete').addEventListener('click', () => {
        savedNotes = savedNotes.filter(n => n.id !== note.id);
        persistNotes(currentVideoId, savedNotes);
        el.remove();
      });

      if (prepend) container.prepend(el);
      else container.appendChild(el);
    }
  </script>
</body>
</html>
