<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Learning Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2e2e36;
      --accent: #d4f264;
      --accent2: #6af2b0;
      --text: #e8e8ec;
      --muted: #6b6b7a;
      --red: #ff5c5c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,242,100,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,242,100,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top bar ── */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .topbar h1 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .topbar-sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-right: auto;
    }

    .add-row {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 520px;
    }

    .add-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 9px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-row input::placeholder { color: var(--muted); }
    .add-row input:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-add:hover { opacity: 0.85; }
    .btn-add:active { transform: scale(0.97); }

    .error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--red);
      color: #fff;
      font-size: 0.78rem;
      padding: 10px 20px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }
    .error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Layout ── */
    .layout {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 65px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .video-count {
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .sidebar-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
      text-align: center;
    }

    .sidebar-empty .empty-icon {
      font-size: 2rem;
      opacity: 0.3;
    }

    .sidebar-empty p {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .video-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .video-list::-webkit-scrollbar { width: 4px; }
    .video-list::-webkit-scrollbar-track { background: transparent; }
    .video-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .video-item:hover { background: var(--surface2); }
    .video-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    /* Checkbox */
    .vi-check {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .vi-check:hover { border-color: var(--accent2); }
    .vi-check.checked {
      background: var(--accent2);
      border-color: var(--accent2);
    }
    .vi-check.checked::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #0e0e10;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .vi-thumb {
      width: 48px;
      height: 34px;
      border-radius: 3px;
      background: var(--surface2);
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .vi-info {
      flex: 1;
      min-width: 0;
    }

    .vi-title {
      font-size: 0.75rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .video-item.done .vi-title { color: var(--muted); }

    .vi-meta {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .vi-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .video-item:hover .vi-delete { opacity: 1; }
    .vi-delete:hover { color: var(--red); }

    /* ── Main panel ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 60px;
    }

    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }
    .empty-state .big-icon { font-size: 3rem; opacity: 0.15; }
    .empty-state h2 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.3rem;
      color: var(--muted);
    }
    .empty-state p { font-size: 0.75rem; color: var(--muted); }

    /* ── Video card ── */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      animation: fadeUp 0.3s ease both;
      max-width: 720px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .vc-titlebar {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .yt-badge {
      background: var(--red);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .vc-title {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .vc-done-badge {
      display: none;
      align-items: center;
      gap: 5px;
      background: rgba(106,242,176,0.12);
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .vc-done-badge.show { display: flex; }
    .vc-done-badge svg { width: 12px; height: 12px; }

    .player-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    .player-wrap > div {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Progress */
    .progress-section {
      padding: 18px 18px 0;
      border-top: 1px solid var(--border);
    }

    .progress-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .time-display {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .time-now {
      font-size: 1.8rem;
      font-family: 'Fraunces', serif;
      color: var(--accent);
      letter-spacing: -1px;
      min-width: 80px;
    }

    .time-sep { color: var(--muted); font-size: 1.1rem; }
    .time-total { font-size: 0.9rem; color: var(--muted); }

    .progress-bar-track {
      width: 100%;
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .progress-pct {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
      margin-top: -14px;
      margin-bottom: 14px;
    }

    /* Notes */
    .notes-section { padding: 0 18px 20px; }

    .notes-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .notes-area {
      width: 100%;
      min-height: 100px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      padding: 12px 14px;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .notes-area::placeholder { color: var(--muted); }
    .notes-area:focus { border-color: var(--accent2); }

    .notes-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 9px;
    }

    .timestamp-hint { font-size: 0.7rem; color: var(--muted); }
    .timestamp-hint span {
      color: var(--accent2);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .timestamp-hint span:hover { opacity: 0.7; }

    .btn-save {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 0.73rem;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-save:hover { background: var(--accent2); color: #0e0e10; }

    .save-confirm {
      font-size: 0.7rem;
      color: var(--accent2);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-confirm.show { opacity: 1; }

    .saved-notes { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }

    .saved-note-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 13px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.2s ease both;
    }

    .note-ts {
      color: var(--accent);
      font-size: 0.7rem;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .note-ts:hover { opacity: 0.7; }

    .note-text { font-size: 0.78rem; color: var(--text); line-height: 1.5; flex: 1; }

    .note-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .note-delete:hover { color: var(--red); }

    /* Responsive collapse for small screens */
    @media (max-width: 640px) {
      .sidebar { width: 220px; }
      .main { padding: 16px 16px 48px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <h1>YT Tracker</h1>
    <span class="topbar-sub">learning log</span>
    <div class="add-row">
      <input type="text" id="urlInput" placeholder="Paste a YouTube URL and press Add…" autocomplete="off"/>
      <button class="btn-add" id="addBtn">Add</button>
    </div>
  </div>

  <div class="layout">

    <!-- Sidebar: video library -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span>your videos</span>
        <span class="video-count" id="videoCount">0</span>
      </div>
      <div class="sidebar-empty" id="sidebarEmpty">
        <div class="empty-icon">▶</div>
        <p>Paste a YouTube link above to start tracking your learning.</p>
      </div>
      <div class="video-list" id="videoList" style="display:none;"></div>
    </div>

    <!-- Main panel -->
    <div class="main" id="mainPanel">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">📺</div>
        <h2>nothing selected yet</h2>
        <p>Add a video from the top bar, then click it to open.</p>
      </div>

      <!-- Video card (hidden until a video is selected) -->
      <div class="video-card" id="videoCard" style="display:none;"></div>
    </div>

  </div>

  <!-- Error toast -->
  <div class="error-toast" id="errorToast">⚠ Couldn't find a valid YouTube video ID.</div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ─────────────────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────────────────
    let videos = [];          // [{id, title, addedAt, done}]
    let activeVideoId = null;
    let currentNotes = [];
    let player = null;
    let pollInterval = null;
    let ytApiReady = false;
    let pendingBuild = null;

    const VIDEOS_KEY = 'yt-tracker-videos-v2';
    function notesKey(id) { return 'yt-tracker-notes-' + id; }

    // ─────────────────────────────────────────────────────────
    // Persistence
    // ─────────────────────────────────────────────────────────
    function saveVideos() {
      try { localStorage.setItem(VIDEOS_KEY, JSON.stringify(videos)); } catch(e) {}
    }
    function loadVideos() {
      try { return JSON.parse(localStorage.getItem(VIDEOS_KEY) || '[]'); } catch(e) { return []; }
    }
    function saveNotes(id, notes) {
      try { localStorage.setItem(notesKey(id), JSON.stringify(notes)); } catch(e) {}
    }
    function loadNotes(id) {
      try { return JSON.parse(localStorage.getItem(notesKey(id)) || '[]'); } catch(e) { return []; }
    }
    function removeNotes(id) {
      try { localStorage.removeItem(notesKey(id)); } catch(e) {}
    }

    // ─────────────────────────────────────────────────────────
    // Helpers
    // ─────────────────────────────────────────────────────────
    function extractVideoId(url) {
      const patterns = [
        /[?&]v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /\/embed\/([a-zA-Z0-9_-]{11})/,
        /\/shorts\/([a-zA-Z0-9_-]{11})/,
      ];
      for (const re of patterns) { const m = url.match(re); if (m) return m[1]; }
      return null;
    }

    function formatTime(sec) {
      if (!sec || isNaN(sec) || sec < 0) return '0:00';
      sec = Math.floor(sec);
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
      return m + ':' + pad(s);
    }
    function pad(n) { return String(n).padStart(2, '0'); }

    function parseTimestamp(ts) {
      const p = ts.split(':').map(Number);
      return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p[0]*60 + (p[1]||0);
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function getCurrentTime() {
      try { if (player && typeof player.getCurrentTime === 'function') return player.getCurrentTime(); } catch(e) {}
      return 0;
    }

    function showToast(msg) {
      const t = document.getElementById('errorToast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function thumbUrl(id) { return 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg'; }

    // ─────────────────────────────────────────────────────────
    // Boot
    // ─────────────────────────────────────────────────────────
    videos = loadVideos();
    renderSidebar();

    // ─────────────────────────────────────────────────────────
    // Add video
    // ─────────────────────────────────────────────────────────
    document.getElementById('addBtn').addEventListener('click', addVideo);
    document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') addVideo(); });

    function addVideo() {
      const input = document.getElementById('urlInput');
      const url = input.value.trim();
      const id = extractVideoId(url);
      if (!id) { showToast('⚠ Couldn\'t find a valid YouTube video ID.'); return; }

      // Don't add duplicates
      if (videos.find(v => v.id === id)) {
        input.value = '';
        openVideo(id);
        return;
      }

      const entry = { id, title: 'Loading…', addedAt: Date.now(), done: false };
      videos.unshift(entry); // newest first
      saveVideos();
      input.value = '';

      // Fetch title async
      fetch('https://www.youtube-nocookie.com/oembed?url=https://www.youtube.com/watch?v=' + id + '&format=json')
        .then(r => r.json())
        .then(d => {
          const v = videos.find(v => v.id === id);
          if (v) { v.title = d.title || 'YouTube Video'; saveVideos(); renderSidebar(); }
        })
        .catch(() => {
          const v = videos.find(v => v.id === id);
          if (v) { v.title = 'YouTube Video'; saveVideos(); renderSidebar(); }
        });

      renderSidebar();
      openVideo(id);
    }

    // ─────────────────────────────────────────────────────────
    // Sidebar rendering
    // ─────────────────────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('videoList');
      const empty = document.getElementById('sidebarEmpty');
      const count = document.getElementById('videoCount');
      count.textContent = videos.length;

      if (videos.length === 0) {
        empty.style.display = 'flex';
        list.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      list.style.display = 'block';
      list.innerHTML = '';

      videos.forEach(v => {
        const item = document.createElement('div');
        item.className = 'video-item' + (v.id === activeVideoId ? ' active' : '') + (v.done ? ' done' : '');
        item.dataset.id = v.id;

        item.innerHTML =
          '<div class="vi-check' + (v.done ? ' checked' : '') + '" data-id="' + v.id + '" title="Mark complete"></div>' +
          '<img class="vi-thumb" src="' + thumbUrl(v.id) + '" alt="" loading="lazy"/>' +
          '<div class="vi-info">' +
            '<div class="vi-title">' + escapeHtml(v.title) + '</div>' +
            '<div class="vi-meta">' + (v.done ? '✓ done' : 'in progress') + '</div>' +
          '</div>' +
          '<button class="vi-delete" data-id="' + v.id + '" title="Remove">×</button>';

        // Click row → open video
        item.addEventListener('click', function(e) {
          if (e.target.classList.contains('vi-check') || e.target.classList.contains('vi-delete')) return;
          openVideo(v.id);
        });

        // Checkbox toggle
        item.querySelector('.vi-check').addEventListener('click', function(e) {
          e.stopPropagation();
          toggleDone(v.id);
        });

        // Delete
        item.querySelector('.vi-delete').addEventListener('click', function(e) {
          e.stopPropagation();
          deleteVideo(v.id);
        });

        list.appendChild(item);
      });
    }

    function toggleDone(id) {
      const v = videos.find(v => v.id === id);
      if (!v) return;
      v.done = !v.done;
      saveVideos();
      renderSidebar();
      // If this is the active video, update its badge too
      if (id === activeVideoId) {
        const badge = document.getElementById('vcDoneBadge');
        if (badge) badge.classList.toggle('show', v.done);
      }
    }

    function deleteVideo(id) {
      videos = videos.filter(v => v.id !== id);
      removeNotes(id);
      saveVideos();
      if (activeVideoId === id) {
        activeVideoId = null;
        stopPolling();
        if (player && typeof player.destroy === 'function') { try { player.destroy(); } catch(e) {} player = null; }
        document.getElementById('videoCard').style.display = 'none';
        document.getElementById('emptyState').style.display = 'flex';
      }
      renderSidebar();
    }

    // ─────────────────────────────────────────────────────────
    // Open / render video in main panel
    // ─────────────────────────────────────────────────────────
    function openVideo(id) {
      activeVideoId = id;
      const v = videos.find(v => v.id === id);
      currentNotes = loadNotes(id);

      document.getElementById('emptyState').style.display = 'none';
      const card = document.getElementById('videoCard');
      card.style.display = 'block';

      card.innerHTML =
        '<div class="vc-titlebar">' +
          '<span class="yt-badge">YT</span>' +
          '<div class="vc-title" id="vcTitle">' + escapeHtml(v ? v.title : 'Loading…') + '</div>' +
          '<div class="vc-done-badge' + (v && v.done ? ' show' : '') + '" id="vcDoneBadge">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
            'completed' +
          '</div>' +
        '</div>' +
        '<div class="player-wrap"><div id="ytPlayerTarget"></div></div>' +
        '<div class="progress-section">' +
          '<div class="progress-label">current position</div>' +
          '<div class="time-display">' +
            '<div class="time-now" id="timeNow">0:00</div>' +
            '<div class="time-sep">/</div>' +
            '<div class="time-total" id="timeTotal">—</div>' +
          '</div>' +
          '<div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>' +
          '<div class="progress-pct" id="progressPct">0%</div>' +
        '</div>' +
        '<div class="notes-section">' +
          '<div class="notes-label">notes</div>' +
          '<textarea class="notes-area" id="notesArea" placeholder="Jot something down… Ctrl+Enter to save. Click a saved timestamp to jump back."></textarea>' +
          '<div class="notes-footer">' +
            '<div class="timestamp-hint"><span id="insertTsBtn">Insert timestamp</span> into note</div>' +
            '<div style="display:flex;align-items:center;gap:10px;">' +
              '<span class="save-confirm" id="saveConfirm">saved ✓</span>' +
              '<button class="btn-save" id="saveNoteBtn">Save Note</button>' +
            '</div>' +
          '</div>' +
          '<div class="saved-notes" id="savedNotes"></div>' +
        '</div>';

      // Render existing notes
      currentNotes.forEach(n => renderNote(n, false));

      // Wire up notes buttons
      document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
      document.getElementById('notesArea').addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveNote(); }
      });
      document.getElementById('insertTsBtn').addEventListener('click', insertTimestamp);

      // Build player
      if (ytApiReady) {
        buildPlayer(id);
      } else {
        pendingBuild = id;
      }

      renderSidebar(); // refresh active state
    }

    // ─────────────────────────────────────────────────────────
    // YouTube IFrame API
    // ─────────────────────────────────────────────────────────
    window.onYouTubeIframeAPIReady = function() {
      ytApiReady = true;
      if (pendingBuild) { buildPlayer(pendingBuild); pendingBuild = null; }
    };

    function buildPlayer(videoId) {
      stopPolling();
      if (player && typeof player.destroy === 'function') { try { player.destroy(); } catch(e) {} player = null; }

      const target = document.getElementById('ytPlayerTarget');
      if (!target) return;

      player = new YT.Player('ytPlayerTarget', {
        videoId: videoId,
        playerVars: { rel: 0, modestbranding: 1, enablejsapi: 1 },
        events: {
          onReady: function() { updateProgress(); startPolling(); },
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PLAYING) { startPolling(); }
            else if (e.data === YT.PlayerState.PAUSED) { stopPolling(); updateProgress(); }
            else if (e.data === YT.PlayerState.ENDED) {
              stopPolling(); updateProgress();
              // Auto-mark done
              const v = videos.find(v => v.id === videoId);
              if (v && !v.done) {
                v.done = true;
                saveVideos();
                renderSidebar();
              }
              const badge = document.getElementById('vcDoneBadge');
              if (badge) badge.classList.add('show');
            }
          }
        }
      });
    }

    function startPolling() {
      stopPolling();
      pollInterval = setInterval(updateProgress, 500);
    }
    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }
    function updateProgress() {
      try {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        const cur = player.getCurrentTime(), dur = player.getDuration();
        const tn = document.getElementById('timeNow'), tt = document.getElementById('timeTotal');
        const pf = document.getElementById('progressFill'), pp = document.getElementById('progressPct');
        if (tn) tn.textContent = formatTime(cur);
        if (tt && dur > 0) tt.textContent = formatTime(dur);
        const pct = dur > 0 ? Math.round((cur/dur)*100) : 0;
        if (pf) pf.style.width = pct + '%';
        if (pp) pp.textContent = pct + '%';
      } catch(e) {}
    }

    // ─────────────────────────────────────────────────────────
    // Notes
    // ─────────────────────────────────────────────────────────
    function insertTimestamp() {
      const ts = formatTime(getCurrentTime());
      const ta = document.getElementById('notesArea');
      if (!ta) return;
      const pos = ta.selectionStart;
      ta.value = ta.value.substring(0, pos) + '[' + ts + '] ' + ta.value.substring(pos);
      ta.focus();
      ta.setSelectionRange(pos + ts.length + 3, pos + ts.length + 3);
    }

    function saveNote() {
      const ta = document.getElementById('notesArea');
      if (!ta) return;
      const text = ta.value.trim();
      if (!text || !activeVideoId) return;

      const note = { ts: formatTime(getCurrentTime()), text, id: Date.now() };
      currentNotes.push(note);
      saveNotes(activeVideoId, currentNotes);
      renderNote(note, true);
      ta.value = '';

      const c = document.getElementById('saveConfirm');
      if (c) { c.classList.add('show'); setTimeout(() => c.classList.remove('show'), 1800); }
    }

    function renderNote(note, prepend) {
      const container = document.getElementById('savedNotes');
      if (!container) return;
      const el = document.createElement('div');
      el.className = 'saved-note-item';
      el.dataset.id = note.id;
      el.innerHTML =
        '<div class="note-ts" title="Jump to this time">' + note.ts + '</div>' +
        '<div class="note-text">' + escapeHtml(note.text) + '</div>' +
        '<button class="note-delete" title="Delete">×</button>';

      el.querySelector('.note-ts').addEventListener('click', () => {
        try { if (player && typeof player.seekTo === 'function') { player.seekTo(parseTimestamp(note.ts), true); player.playVideo(); } } catch(e) {}
      });
      el.querySelector('.note-delete').addEventListener('click', () => {
        currentNotes = currentNotes.filter(n => n.id !== note.id);
        saveNotes(activeVideoId, currentNotes);
        el.remove();
      });

      if (prepend) container.prepend(el); else container.appendChild(el);
    }
  </script>
</body>
</html>
